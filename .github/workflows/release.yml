name: Release

# Trigger by pushing a version tag: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Linux ───────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libglib2.0-dev

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download assets
        run: |
          curl -fsSL "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg-full.js" \
            -o assets/mathjax.min.js
          curl -fsSL "https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js" \
            -o assets/mermaid.min.js

      - name: Build binary
        run: |
          pyinstaller --name Chomnu --windowed --onefile \
            --add-data "assets:assets" --clean -y app.py

      - name: Rename for clarity
        run: mv dist/Chomnu Chomnu-linux-x86_64

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Chomnu-linux-x86_64
          generate_release_notes: true

  # ── macOS ───────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt py2app

      - name: Download assets
        run: |
          curl -fsSL "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg-full.js" \
            -o assets/mathjax.min.js
          curl -fsSL "https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js" \
            -o assets/mermaid.min.js

      - name: Build .app
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: python setup.py py2app

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - dist/Chomnu.app

      - name: Zip
        run: cd dist && zip -r ../Chomnu-macos.zip Chomnu.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Chomnu-macos.zip

  # ── Windows ─────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Download assets
        shell: bash
        run: |
          curl -fsSL "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg-full.js" \
            -o assets/mathjax.min.js
          curl -fsSL "https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js" \
            -o assets/mermaid.min.js

      - name: Build .exe
        run: |
          pyinstaller --name Chomnu --windowed --onefile `
            --add-data "assets;assets" --clean -y app.py

      - name: Rename for clarity
        run: mv dist/Chomnu.exe Chomnu-windows-x86_64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Chomnu-windows-x86_64.exe
